<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tabs Outliner</title>
    <link rel="stylesheet" href="sidebar.css" />

  <body>
    <!-- Icon sprite (lucide-style, 24x24, 2px stroke). Referenced by
         <svg class="..."><use href="#icon-NAME"></use></svg> in the rendered tree
         and toolbar. Hidden via .icon-sprite { display: none }. -->
    <svg class="icon-sprite" aria-hidden="true" focusable="false">
      <symbol id="icon-chevron-right" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6" /></symbol>
      <symbol id="icon-chevron-down" viewBox="0 0 24 24"><path d="m6 9 6 6 6-6" /></symbol>
      <symbol id="icon-pencil" viewBox="0 0 24 24"><path d="m4 20 4.5-1 10-10a2.1 2.1 0 0 0-3-3l-10 10L4 20Z" /><path d="m13.5 7.5 3 3" /></symbol>
      <symbol id="icon-close-circle" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" /><path d="M15 9l-6 6M9 9l6 6" /></symbol>
      <symbol id="icon-flatten" viewBox="0 0 24 24"><path d="M5 5v14" /><path d="M18 7v10" /><path d="M18 12H8" /><path d="m10 8-4 4 4 4" /></symbol>
      <symbol id="icon-trash" viewBox="0 0 24 24"><path d="M4 7h16" /><path d="M9 7V4h6v3" /><path d="M6 7l1 14h10l1-14" /><path d="M10 11v6M14 11v6" /></symbol>
      <symbol id="icon-group" viewBox="0 0 24 24"><path d="M8.5 5c-1.8 0-1.8 1.6-1.8 2.8V10c0 .9-.8 1.8-1.7 1.8.9 0 1.7.9 1.7 1.8v2.2c0 1.2 0 2.8 1.8 2.8" /><path d="M11 8h7" /><path d="M11 12h7" /><path d="M11 16h7" /></symbol>
      <symbol id="icon-to-top-level" viewBox="0 0 24 24"><path d="M4 5h16" /><path d="m8 13 4-4 4 4" /><path d="M12 9v10" /></symbol>
      <symbol id="icon-to-bottom" viewBox="0 0 24 24"><path d="M4 19h16" /><path d="m8 11 4 4 4-4" /><path d="M12 5v10" /></symbol>
      <symbol id="icon-undo" viewBox="0 0 24 24"><path d="M9 14 4 9l5-5" /><path d="M4 9h10a6 6 0 0 1 0 12h-2" /></symbol>
      <symbol id="icon-redo" viewBox="0 0 24 24"><path d="m15 14 5-5-5-5" /><path d="M20 9H10a6 6 0 0 0 0 12h2" /></symbol>
      <symbol id="icon-export" viewBox="0 0 24 24"><path d="M12 3v12" /><path d="m7 8 5-5 5 5" /><path d="M5 15v4h14v-4" /></symbol>
      <symbol id="icon-import" viewBox="0 0 24 24"><path d="M12 2.5v12" /><path d="m7 9.5 5 5 5-5" /><path d="M5 15v4h14v-4" /></symbol>
      <symbol id="icon-gear" viewBox="0 0 24 24"><path d="M12 8.5a3.5 3.5 0 1 1 0 7a3.5 3.5 0 0 1 0-7Z" /><path d="m19 13.5 1.5 1-2 3.5-1.8-.8a7.3 7.3 0 0 1-1.5.9L15 20h-6l-.2-1.9a7.3 7.3 0 0 1-1.5-.9l-1.8.8-2-3.5 1.5-1a7.8 7.8 0 0 1 0-3l-1.5-1 2-3.5 1.8.8a7.3 7.3 0 0 1 1.5-.9L9 4h6l.2 1.9a7.3 7.3 0 0 1 1.5.9l1.8-.8 2 3.5-1.5 1a7.8 7.8 0 0 1 0 3Z" /></symbol>
    </svg>
    <script src="sidebar.js"></script>
